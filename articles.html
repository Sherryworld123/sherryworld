    <script>
    (function () {
        var grid = document.getElementById('articles-grid');
        var loading = document.getElementById('articles-load-status');
        var errEl = document.getElementById('articles-error');
        if (!grid || !loading) return;

        fetch('articles.json', { cache: 'no-store' })
            .then(function (r) {
                if (!r.ok) throw new Error('http ' + r.status);
                return r.json();
            })
            .then(function (items) {
                loading.style.display = 'none';
                grid.innerHTML = '';
                if (!items || !items.length) {
                    var empty = document.createElement('p');
                    empty.style.cssText = 'grid-column:1/-1;text-align:center;color:var(--color-text-light)';
                    empty.textContent = '暂无已发布文章。';
                    grid.appendChild(empty);
                    return;
                }
                items.forEach(function (it) {
                    var a = document.createElement('a');
                    a.href = it.href || '#';
                    a.className = 'article-card';
                    var d = document.createElement('div');
                    d.className = 'article-date';
                    d.textContent = it.date_label || '';
                    var h3 = document.createElement('h3');
                    h3.textContent = it.title || '';
                    var p = document.createElement('p');
                    p.textContent = it.excerpt || '';
                    var span = document.createElement('span');
                    span.className = 'read-more';
                    span.textContent = '阅读全文 →';
                    a.appendChild(d);
                    a.appendChild(h3);
                    a.appendChild(p);
                    a.appendChild(span);
                    grid.appendChild(a);
                });
            })
            .catch(function () {
                loading.style.display = 'none';
                if (errEl) {
                    errEl.style.display = 'block';
                    errEl.textContent = '文章列表加载失败（缺少 articles.json 或网络错误），请刷新或联系管理员更新站点。';
                }
            });
    })();
    </script>
    <script src="script.js"></script>
</body>
</html>
